<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Recomp Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f7efe8;--card:rgba(255,255,255,.84);--ink:#27211f;--muted:#756b65;
      --line:rgba(70,50,40,.14);--accent:#715040;--soft:#ead6c8;--mint:#dce7dc;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif
    }
    *{box-sizing:border-box} body{margin:0;color:var(--ink);min-height:100svh;background:
      radial-gradient(circle at 0% 0%,#f3ded0,transparent 35%),
      radial-gradient(circle at 90% 5%,#dce7dc,transparent 35%),var(--bg)}
    button,input,select,textarea{font:inherit} .wrap{max-width:780px;margin:0 auto;padding:18px 16px 96px}
    .login{min-height:100svh;display:grid;place-items:center;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:0 18px 50px rgba(94,71,58,.16);backdrop-filter:blur(14px)}
    .login .card{width:min(460px,100%);padding:28px}.brand{width:58px;height:58px;border-radius:21px;display:grid;place-items:center;background:linear-gradient(145deg,#f3ded0,#dce7dc);font-size:28px;margin-bottom:18px}
    .eyebrow{color:var(--accent);letter-spacing:.12em;text-transform:uppercase;font-size:11px;font-weight:850;margin:0 0 6px}
    h1{font-size:25px;margin:0} h2{font-size:25px;margin:0 0 8px} h3{margin:0;font-size:17px}.muted{color:var(--muted);line-height:1.45}
    .top{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px}.stack{display:grid;gap:16px}
    .hero{display:flex;justify-content:space-between;gap:16px;align-items:center}.bubble{width:76px;height:76px;border-radius:27px;display:grid;place-items:center;background:linear-gradient(145deg,var(--mint),#f3ded0);font-size:32px;flex:0 0 auto}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:15px;box-shadow:0 12px 35px rgba(94,71,58,.12)}
    .stat small{display:block;color:var(--muted);font-weight:800;font-size:12px}.stat strong{display:block;font-size:22px;margin-top:4px}.stat span{display:block;color:var(--muted);font-size:11px;margin-top:2px}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.formtitle{display:flex;gap:12px;align-items:center;margin-bottom:14px}.icon{width:40px;height:40px;border-radius:16px;background:var(--soft);display:grid;place-items:center;color:var(--accent);font-size:20px;flex:0 0 auto}
    .form{display:grid;gap:13px}.field{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}
    input,select,textarea{width:100%;min-height:48px;border-radius:17px;border:1px solid var(--line);background:rgba(255,255,255,.9);padding:12px 14px;color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
    textarea{min-height:92px;resize:vertical}.btn{border:0;min-height:50px;border-radius:18px;width:100%;font-weight:900}.primary{background:var(--accent);color:white}.secondary{background:var(--soft);color:var(--accent)}.ghost{width:auto;min-height:42px;padding:0 14px;border:1px solid var(--line);background:var(--card);color:var(--ink)}
    .tabs{position:fixed;left:50%;bottom:max(12px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(760px,calc(100vw - 24px));display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:26px;padding:7px;box-shadow:0 18px 50px rgba(94,71,58,.16);z-index:10}
    .tabs button{border:0;background:transparent;color:var(--muted);border-radius:20px;padding:9px 3px;display:grid;gap:3px;place-items:center;font-weight:850}.tabs span{font-size:10px}.tabs .active{background:var(--soft);color:var(--accent)}
    .hidden{display:none!important}.status{font-weight:800;color:var(--accent);font-size:13px}.snap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.snap div{background:rgba(255,255,255,.55);border-radius:16px;padding:12px;color:var(--muted);font-size:13px}.snap b{display:block;color:var(--ink);font-size:17px}.item{background:rgba(255,255,255,.55);border-radius:16px;padding:12px;color:var(--muted);font-size:13px;margin-top:10px}.item b{color:var(--ink)}.checks{background:rgba(255,255,255,.55);border-radius:16px;padding:12px;display:grid;gap:9px}.checks label{display:flex;gap:8px;align-items:center;color:var(--muted);font-weight:800;font-size:13px}.checks input{width:auto;min-height:auto}
    .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:#27211f;color:white;border-radius:999px;padding:12px 16px;font-weight:850;z-index:30}
    @media(min-width:720px){.form{grid-template-columns:repeat(2,1fr)}.wide,.btn,.checks{grid-column:1/-1}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <section class="card">
      <div class="brand">✦</div>
      <p class="eyebrow">Private Recomp Journal</p>
      <h1>Recomp Tracker</h1>
      <p class="muted">Track check-ins, measurements, meal flexibility, and strength signals without overreacting to normal fluctuations.</p>
      <div class="form">
        <label class="field wide">Email<input id="email" type="email" placeholder="name@email.com"></label>
        <button class="btn primary wide" onclick="signIn()">Send magic link</button>
      </div>
      <p id="loginStatus" class="status"></p>
    </section>
  </div>

  <div id="app" class="wrap hidden">
    <header class="top">
      <div><p class="eyebrow">Private tracker</p><h1>Recomp Tracker</h1></div>
      <button class="btn ghost" onclick="signOut()">Sign out</button>
    </header>

    <main id="home" class="stack"></main>
    <main id="weekly" class="stack hidden"></main>
    <main id="measure" class="stack hidden"></main>
    <main id="meals" class="stack hidden"></main>
    <main id="strength" class="stack hidden"></main>

    <nav class="tabs">
      <button id="tab-home" class="active" onclick="show('home')">⌁<span>Home</span></button>
      <button id="tab-weekly" onclick="show('weekly')">◷<span>Weekly</span></button>
      <button id="tab-measure" onclick="show('measure')">◎<span>Measure</span></button>
      <button id="tab-meals" onclick="show('meals')">◌<span>Meals</span></button>
      <button id="tab-strength" onclick="show('strength')">◇<span>Strength</span></button>
    </nav>
  </div>

  <div id="toast" class="toast hidden"></div>

<script>
const SUPABASE_URL="https://wzwwitbgxcbbspjkpnzx.supabase.co";
const SUPABASE_KEY="sb_publishable_Bm1nP1U0jLMAI3V4_xly6A_wsdpT3Hz";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let session=null;
let store={weekly:[],measure:[],meals:[],strength:[]};
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const n=v=>v===""||v==null?null:Number(v);
const i=v=>v===""||v==null?null:parseInt(v,10);
const byDate=a=>[...(a||[])].sort((x,y)=>new Date(x.entry_date)-new Date(y.entry_date));
const last=a=>a&&a.length?a[a.length-1]:null;
const avg=(a,k)=>{let v=(a||[]).map(r=>Number(r[k])).filter(Number.isFinite);return v.length?v.reduce((x,y)=>x+y,0)/v.length:null};
const delta=(a,k)=>{let v=byDate(a||[]).map(r=>Number(r[k])).filter(Number.isFinite);return v.length>1?v[v.length-1]-v[0]:null};

async function init(){
  const res=await sb.auth.getSession(); session=res.data.session;
  sb.auth.onAuthStateChange((e,s)=>{session=s;renderAuth()});
  renderAuth();
}
function renderAuth(){
  if(session){$("login").classList.add("hidden");$("app").classList.remove("hidden");loadData()}
  else{$("login").classList.remove("hidden");$("app").classList.add("hidden")}
}
async function signIn(){
  const email=$("email").value.trim().toLowerCase();
  if(!email)return;
  const res=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.origin+window.location.pathname}});
  $("loginStatus").textContent=res.error?res.error.message:"Check your email for the sign-in link.";
}
async function signOut(){await sb.auth.signOut();session=null;renderAuth()}
async function loadData(){
  const uid=session.user.id;
  const [w,m,nf,s]=await Promise.all([
    sb.from("weekly_checkins").select("*").eq("user_id",uid).order("entry_date"),
    sb.from("monthly_measurements").select("*").eq("user_id",uid).order("entry_date"),
    sb.from("nutrition_flexibility").select("*").eq("user_id",uid).order("entry_date"),
    sb.from("strength_markers").select("*").eq("user_id",uid).order("entry_date")
  ]);
  store.weekly=w.data||[];store.measure=m.data||[];store.meals=nf.data||[];store.strength=s.data||[];
  renderAll();
}
function show(name){
  ["home","weekly","measure","meals","strength"].forEach(x=>$(x).classList.toggle("hidden",x!==name));
  ["home","weekly","measure","meals","strength"].forEach(x=>$("tab-"+x).classList.toggle("active",x===name));
}
function signal(){
  const recent=byDate(store.weekly).slice(-4), latest=last(byDate(store.weekly));
  if(recent.length<3)return["Data Too New","Log at least 3–4 weeks before reading trends."];
  const protein=avg(recent,"protein_avg"), workouts=avg(recent,"workouts_completed");
  const waist=delta(byDate(store.measure).slice(-3),"navel_waist"), weight=delta(recent,"weight");
  if(protein!=null&&protein<85)return["Review Protein Consistency","Recent protein average is below the current 100g/day target."];
  if(workouts!=null&&workouts<4)return["Build Consistency","Workout completion has dipped below the intended routine."];
  if(waist!=null&&waist<0&&(weight==null||Math.abs(weight)<=2))return["Likely Recomp Signal","Waist is trending down while weight is relatively stable."];
  if((latest?.meals_out_of_control||0)>=3)return["Review Nutrition Flexibility","Several meals were outside normal control this week."];
  return["Hold Course","Current pattern looks stable. Keep logging trends."];
}
function renderAll(){renderHome();renderWeekly();renderMeasure();renderMeals();renderStrength()}
function renderHome(){
  const recent=byDate(store.weekly).slice(-4), latest=last(byDate(store.weekly)), lm=last(byDate(store.measure));
  const [label,detail]=signal(), protein=avg(recent,"protein_avg"), workouts=avg(recent,"workouts_completed");
  const meals=recent.reduce((s,r)=>s+(Number(r.meals_out_of_control)||0),0);
  $("home").innerHTML=`
    <section class="card hero"><div><p class="eyebrow">Current signal</p><h2>${label}</h2><p class="muted">${detail}</p></div><div class="bubble">⌁</div></section>
    <section class="grid">
      <div class="stat"><small>Latest weight</small><strong>${latest?.weight?latest.weight+" lb":"—"}</strong><span>scale signal</span></div>
      <div class="stat"><small>Protein avg</small><strong>${protein!=null?protein.toFixed(0)+"g":"—"}</strong><span>recent average</span></div>
      <div class="stat"><small>Workouts avg</small><strong>${workouts!=null?workouts.toFixed(1):"—"}</strong><span>recent average</span></div>
      <div class="stat"><small>Meals out of control</small><strong>${meals}</strong><span>last 4 entries</span></div>
    </section>
    <section class="card"><div class="row"><h3>Measurement snapshot</h3><span>◎</span></div>
      ${lm?`<div class="snap"><div>Natural waist <b>${lm.natural_waist||"—"}</b></div><div>Navel waist <b>${lm.navel_waist||"—"}</b></div><div>Hips/glutes <b>${lm.hips_glutes||"—"}</b></div><div>Thigh <b>${lm.thigh||"—"}</b></div></div>`:`<p class="muted">Add monthly measurements when ready.</p>`}
    </section>
    <section class="card"><div class="row"><h3>ChatGPT handoff</h3><span>▣</span></div><p class="muted">Copy a clean summary and paste it into ChatGPT for trend analysis.</p><button class="btn secondary" onclick="copySummary()">Copy ChatGPT Summary</button></section>`;
}
function field(label,id,type="text",extra=""){return `<label class="field">${label}<input id="${id}" type="${type}" ${extra}></label>`}
function text(label,id){return `<label class="field wide">${label}<textarea id="${id}"></textarea></label>`}
function sel(label,id,opts){return `<label class="field">${label}<select id="${id}">${opts.map(o=>`<option>${o}</option>`).join("")}</select></label>`}
function recent(rows,fn){let r=byDate(rows).slice(-5).reverse();return r.length?r.map(x=>`<div class="item">${fn(x)}</div>`).join(""):`<p class="muted">No entries yet.</p>`}

function renderWeekly(){
  $("weekly").innerHTML=`<section class="card"><div class="formtitle"><div class="icon">◷</div><div><h2>Weekly Check-In</h2><p class="muted">Use similar conditions each week when possible.</p></div></div><div class="form">
    ${field("Date","w_date","date")}${field("Weight","w_weight","number",'step="0.1" inputmode="decimal" placeholder="132.0"')}${field("Protein average","w_protein","number",'inputmode="numeric" placeholder="100"')}${field("Workouts completed","w_workouts","number",'inputmode="numeric" placeholder="5"')}${field("Strength sessions","w_strength","number",'inputmode="numeric" placeholder="3"')}${field("HIIT/cardio/recovery","w_cardio","number",'inputmode="numeric" placeholder="2"')}${sel("Sleep quality","w_sleep",["Poor","Okay","Good","Great"])}${sel("Energy/recovery","w_energy",["Poor","Okay","Good","Great"])}${sel("Hunger/cravings","w_hunger",["Low","Normal","High"])}${field("Meals out of control","w_meals","number",'inputmode="numeric" placeholder="0"')}${field("Cycle / water retention","w_cycle","text",'placeholder="Optional"')}${text("Notes","w_notes")}<button class="btn primary wide" onclick="saveWeekly()">Save weekly check-in</button></div><p id="w_status" class="status"></p></section>
    <section class="card"><h3>Recent weekly entries</h3>${recent(store.weekly,r=>`<b>${r.entry_date}</b> — ${r.weight||"—"} lb, protein ${r.protein_avg||"—"}g, workouts ${r.workouts_completed||"—"}`)}</section>`;
  $("w_date").value=today();
}
function renderMeasure(){
  $("measure").innerHTML=`<section class="card"><div class="formtitle"><div class="icon">◎</div><div><h2>Monthly Measurements</h2><p class="muted">Use the same landmarks each time.</p></div></div><div class="form">
    ${field("Date","m_date","date")}${field("Natural waist","m_natural","number",'step="0.1" inputmode="decimal"')}${field("Navel waist","m_navel","number",'step="0.1" inputmode="decimal"')}${field("Hips/glutes","m_hips","number",'step="0.1" inputmode="decimal"')}${field("Upper arm","m_arm","number",'step="0.1" inputmode="decimal"')}${field("Thigh","m_thigh","number",'step="0.1" inputmode="decimal"')}${field("Calf optional","m_calf","number",'step="0.1" inputmode="decimal"')}
    <div class="checks wide"><label><input id="m_front" type="checkbox"> Front photo taken</label><label><input id="m_side" type="checkbox"> Side photo taken</label><label><input id="m_back" type="checkbox"> Back photo taken</label></div>
    ${text("Clothing / visual notes","m_notes")}<button class="btn primary wide" onclick="saveMeasure()">Save measurements</button></div><p id="m_status" class="status"></p></section>
    <section class="card"><h3>Recent measurements</h3>${recent(store.measure,r=>`<b>${r.entry_date}</b> — navel ${r.navel_waist||"—"}, hips ${r.hips_glutes||"—"}, thigh ${r.thigh||"—"}`)}</section>`;
  $("m_date").value=today();
}
function renderMeals(){
  $("meals").innerHTML=`<section class="card"><div class="formtitle"><div class="icon">◌</div><div><h2>Nutrition Flexibility</h2><p class="muted">Capture what happened when meals were not fully controlled.</p></div></div><div class="form">
    ${field("Date","n_date","date")}${field("Meal context","n_context","text",'placeholder="Sister dinner, restaurant, event..."')}${field("Meal type","n_type","text",'placeholder="Dinner, lunch, snack..."')}${sel("Protein included?","n_protein",["Yes","Partial","No"])}${field("Protein backup used","n_backup","text",'placeholder="Shake, yogurt, eggs, turkey..."')}${field("Portion strategy","n_portion","text",'placeholder="Protein first, smaller starch, etc."')}${sel("Next-day energy","n_energy",["Poor","Okay","Good","Great"])}${sel("Next-day recovery","n_recovery",["Poor","Okay","Good","Great"])}${text("What worked?","n_worked")}${text("What to try next time?","n_next")}<button class="btn primary wide" onclick="saveMeals()">Save nutrition note</button></div><p id="n_status" class="status"></p></section>
    <section class="card"><h3>Recent nutrition notes</h3>${recent(store.meals,r=>`<b>${r.entry_date}</b> — ${r.meal_context||"meal"}, protein: ${r.protein_included||"—"}`)}</section>`;
  $("n_date").value=today();
}
function renderStrength(){
  $("strength").innerHTML=`<section class="card"><div class="formtitle"><div class="icon">◇</div><div><h2>Strength Markers</h2><p class="muted">Track a few repeatable exercises.</p></div></div><div class="form">
    ${field("Date","s_date","date")}${field("Exercise","s_exercise","text",'placeholder="Hip thrust, row, squat..."')}${field("Load","s_load","number",'step="0.5" inputmode="decimal"')}${field("Reps","s_reps","number",'inputmode="numeric"')}${field("Sets","s_sets","number",'inputmode="numeric"')}${field("RPE optional","s_rpe","number",'step="0.5" inputmode="decimal" placeholder="1-10"')}${text("Notes","s_notes")}<button class="btn primary wide" onclick="saveStrength()">Save strength marker</button></div><p id="s_status" class="status"></p></section>
    <section class="card"><h3>Recent strength markers</h3>${recent(store.strength,r=>`<b>${r.entry_date}</b> — ${r.exercise}, ${r.load||"—"} x ${r.reps||"—"} x ${r.sets||"—"}`)}</section>`;
  $("s_date").value=today();
}

async function saveWeekly(){
  const p={user_id:session.user.id,entry_date:$("w_date").value||today(),weight:n($("w_weight").value),protein_avg:n($("w_protein").value),workouts_completed:i($("w_workouts").value),strength_sessions:i($("w_strength").value),cardio_hiit_recovery_sessions:i($("w_cardio").value),sleep_quality:$("w_sleep").value,energy_recovery:$("w_energy").value,hunger_cravings:$("w_hunger").value,meals_out_of_control:i($("w_meals").value)||0,cycle_water_retention:$("w_cycle").value,notes:$("w_notes").value};
  const r=await sb.from("weekly_checkins").insert(p);$("w_status").textContent=r.error?r.error.message:"Weekly check-in saved.";if(!r.error)loadData();
}
async function saveMeasure(){
  const p={user_id:session.user.id,entry_date:$("m_date").value||today(),natural_waist:n($("m_natural").value),navel_waist:n($("m_navel").value),hips_glutes:n($("m_hips").value),upper_arm:n($("m_arm").value),thigh:n($("m_thigh").value),calf:n($("m_calf").value),front_photo_taken:$("m_front").checked,side_photo_taken:$("m_side").checked,back_photo_taken:$("m_back").checked,clothing_visual_notes:$("m_notes").value};
  const r=await sb.from("monthly_measurements").insert(p);$("m_status").textContent=r.error?r.error.message:"Measurements saved.";if(!r.error)loadData();
}
async function saveMeals(){
  const p={user_id:session.user.id,entry_date:$("n_date").value||today(),meal_context:$("n_context").value,meal_type:$("n_type").value,protein_included:$("n_protein").value,protein_backup_used:$("n_backup").value,portion_strategy:$("n_portion").value,next_day_energy:$("n_energy").value,next_day_recovery:$("n_recovery").value,what_worked:$("n_worked").value,next_time_adjustment:$("n_next").value};
  const r=await sb.from("nutrition_flexibility").insert(p);$("n_status").textContent=r.error?r.error.message:"Nutrition note saved.";if(!r.error)loadData();
}
async function saveStrength(){
  const p={user_id:session.user.id,entry_date:$("s_date").value||today(),exercise:$("s_exercise").value||"Exercise",load:n($("s_load").value),reps:i($("s_reps").value),sets:i($("s_sets").value),rpe:n($("s_rpe").value),notes:$("s_notes").value};
  const r=await sb.from("strength_markers").insert(p);$("s_status").textContent=r.error?r.error.message:"Strength marker saved.";if(!r.error)loadData();
}
async function copySummary(){
  const [label,detail]=signal();
  const summary={app:"Recomp Tracker",current_signal:{label,detail},latest_weekly_checkins:byDate(store.weekly).slice(-6),recent_measurements:byDate(store.measure).slice(-3),recent_nutrition_flexibility_notes:byDate(store.meals).slice(-6),recent_strength_markers:byDate(store.strength).slice(-8),analysis_request:"Please analyze body recomposition trends, focusing on scale vs measurements, protein consistency, workouts, recovery, nutrition flexibility, and any recommended small adjustments."};
  await navigator.clipboard.writeText("BODY RECOMP TRACKER SUMMARY\n\n"+JSON.stringify(summary,null,2));toast("ChatGPT summary copied.");
}
function toast(msg){$("toast").textContent=msg;$("toast").classList.remove("hidden");setTimeout(()=>$("toast").classList.add("hidden"),2300)}
init();
</script>
</body>
</html>
